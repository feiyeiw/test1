<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 1³ Machine</title>
    <link rel="stylesheet" href="style.css">
    <script>
    (function() {
        var lang = localStorage.getItem('siteLanguage') || 'en';
        if (lang !== 'en') {
            document.documentElement.classList.add('i18n-pending');
        }
    })();
    </script>

    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background-color: #f8f8f8;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 16px;
        }
        
        .form-group button {
            width: 100%;
            padding: 12px;
            background-color: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .form-group button:hover {
            background-color: #0052a3;
        }
        
        .error-message {
            color: #0066cc;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-main">
            <div class="container">
                <div class="logo">
                    <a href="index.html">
                        <img src="logo.jpg" alt="13machine">
                        <span>1³ MACHINE</span>
                    </a>
                </div>
                <div class="header-actions">
                    <div class="language-selector">
                        <select id="lang-select" onchange="switchLanguage(this.value)">
                            <option value="en">English</option>
                            <option value="zh">中文</option>
                            <option value="ja">日本語</option>
                            <option value="fr">Français</option>
                            <option value="es">Español</option>
                            <option value="ar">العربية</option>
                            <option value="ko">한국어</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <main>
        <div class="login-container">
            <h2>Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <button type="submit">Login</button>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <div style="margin-top: 20px; padding: 10px; background-color: #f0f0f0; border-radius: 4px; font-size: 14px; color: #666; text-align: center;">
                    Default credentials: <strong>admin</strong> / <strong>admin123</strong>
                </div>
            </form>
        </div>
    </main>
    
    <script src="common.js" defer></script>
    <script src="admin.js" defer></script>
</body>
</html>

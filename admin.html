<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 13ASRS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --admin-bg: #f4f6f8;
            --admin-panel: #ffffff;
            --admin-ink: #17202a;
            --admin-muted: #667085;
            --admin-line: #d9e1ea;
            --admin-accent: #0b67d1;
            --admin-good: #11845b;
            --admin-warn: #b7791f;
            --admin-danger: #c9342f;
        }

        body {
            margin: 0;
            background: var(--admin-bg);
            color: var(--admin-ink);
        }

        .admin-header {
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            background: #fff;
            border-bottom: 1px solid var(--admin-line);
        }

        .admin-header a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--admin-ink);
            text-decoration: none;
            font-weight: 800;
        }

        .admin-header img {
            width: 48px;
            height: 34px;
            object-fit: contain;
        }

        .admin-shell {
            min-height: calc(100vh - 72px);
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
        }

        .admin-sidebar {
            background: #101820;
            color: #fff;
            padding: 24px 18px;
            position: sticky;
            top: 0;
            height: calc(100vh - 72px);
        }

        .admin-brand {
            display: grid;
            gap: 4px;
            margin-bottom: 28px;
        }

        .admin-brand strong {
            font-size: 18px;
        }

        .admin-brand span {
            color: rgba(255, 255, 255, 0.62);
            font-size: 13px;
        }

        .admin-nav {
            display: grid;
            gap: 8px;
        }

        .admin-nav button {
            border: 0;
            background: transparent;
            color: rgba(255, 255, 255, 0.72);
            text-align: left;
            padding: 12px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
        }

        .admin-nav button.active {
            background: #fff;
            color: #101820;
        }

        .admin-main {
            padding: 28px;
        }

        .admin-topbar {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: center;
            margin-bottom: 22px;
        }

        .admin-topbar h1 {
            margin: 0 0 4px;
            font-size: 28px;
            letter-spacing: 0;
        }

        .admin-topbar p {
            margin: 0;
            color: var(--admin-muted);
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .cms-layout {
            display: grid;
            grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .panel {
            background: var(--admin-panel);
            border: 1px solid var(--admin-line);
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--admin-line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel-header h2,
        .panel-header h3 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .panel-body {
            padding: 16px;
        }

        .blog-toolbar {
            display: grid;
            grid-template-columns: 1fr 132px;
            gap: 10px;
            margin-bottom: 12px;
        }

        .blog-toolbar input,
        .blog-toolbar select,
        .form-grid input,
        .form-grid textarea,
        .form-grid select {
            width: 100%;
            border: 1px solid var(--admin-line);
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
            background: #fff;
            color: var(--admin-ink);
            box-sizing: border-box;
        }

        .blog-list {
            display: grid;
            gap: 10px;
            max-height: calc(100vh - 270px);
            overflow: auto;
        }

        .blog-list-item {
            border: 1px solid var(--admin-line);
            border-radius: 8px;
            padding: 12px;
            background: #fff;
            cursor: pointer;
            text-align: left;
        }

        .blog-list-item.active {
            border-color: var(--admin-accent);
            box-shadow: 0 0 0 2px rgba(11, 103, 209, 0.14);
        }

        .blog-list-item h3 {
            margin: 0 0 8px;
            font-size: 16px;
            letter-spacing: 0;
        }

        .blog-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            color: var(--admin-muted);
            font-size: 13px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: 800;
            background: #edf2f7;
            color: #344054;
        }

        .status-pill.published {
            background: #dcfce7;
            color: var(--admin-good);
        }

        .status-pill.draft {
            background: #fef3c7;
            color: var(--admin-warn);
        }

        .editor-actions {
            position: sticky;
            top: 0;
            z-index: 3;
            background: var(--admin-panel);
            border-bottom: 1px solid var(--admin-line);
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .btn {
            border: 0;
            border-radius: 6px;
            padding: 10px 14px;
            font-weight: 800;
            cursor: pointer;
            background: #e7edf4;
            color: var(--admin-ink);
            text-decoration: none;
        }

        .btn.primary {
            background: var(--admin-accent);
            color: #fff;
        }

        .btn.success {
            background: var(--admin-good);
            color: #fff;
        }

        .btn.danger {
            background: var(--admin-danger);
            color: #fff;
        }

        .btn.ghost {
            background: transparent;
            border: 1px solid var(--admin-line);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .form-group {
            display: grid;
            gap: 6px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-weight: 800;
            color: #344054;
        }

        .form-group small {
            color: var(--admin-muted);
        }

        .image-input-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
        }

        .cover-preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: 1px dashed var(--admin-line);
            border-radius: 6px;
            background: #f8fafc;
            overflow: hidden;
            display: none;
        }

        .cover-preview.show {
            display: block;
        }

        .cover-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .rich-toolbar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 10px;
            border: 1px solid var(--admin-line);
            border-bottom: 0;
            border-radius: 6px 6px 0 0;
            background: #f8fafc;
        }

        .rich-toolbar button {
            min-width: 38px;
            height: 34px;
            border: 1px solid var(--admin-line);
            background: #fff;
            border-radius: 5px;
            font-weight: 800;
            cursor: pointer;
        }

        .rich-editor {
            min-height: 360px;
            padding: 16px;
            border: 1px solid var(--admin-line);
            border-radius: 0 0 6px 6px;
            background: #fff;
            line-height: 1.7;
            overflow: auto;
        }

        .rich-editor:focus {
            outline: 2px solid rgba(11, 103, 209, 0.22);
            outline-offset: 2px;
        }

        .notice {
            padding: 12px 14px;
            border-radius: 6px;
            background: #eef6ff;
            color: #1d4f91;
            margin-bottom: 14px;
            display: none;
        }

        .notice.show {
            display: block;
        }

        .notice.success {
            background: #ecfdf3;
            color: var(--admin-good);
        }

        .notice.error {
            background: #fef3f2;
            color: var(--admin-danger);
        }

        .page-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .settings-list {
            display: grid;
            gap: 12px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--admin-line);
        }

        .setting-row span {
            color: var(--admin-muted);
            text-align: right;
        }

        @media (max-width: 980px) {
            .admin-shell,
            .cms-layout,
            .page-grid,
            .form-grid {
                grid-template-columns: 1fr;
            }

            .admin-sidebar {
                position: static;
                height: auto;
            }

            .admin-main {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="index.html" aria-label="13ASRS 首页">
            <img src="logo.jpg" alt="13ASRS">
            <span>13ASRS</span>
        </a>
        <button class="btn ghost" type="button" onclick="logout()">退出登录</button>
    </header>

    <main id="adminDashboard" class="admin-shell">
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <strong>CMS Console</strong>
                <span>Blog v2 / Cloudflare KV</span>
            </div>
            <nav class="admin-nav" aria-label="后台栏目">
                <button type="button" class="active" data-admin-tab="blogs">Blog 管理</button>
                <button type="button" data-admin-tab="pages">页面内容</button>
                <button type="button" data-admin-tab="settings">设置</button>
            </nav>
        </aside>

        <section class="admin-main">
            <div class="admin-topbar">
                <div>
                    <h1>13ASRS 后台管理</h1>
                    <p>发布、编辑和管理网站博客内容。</p>
                </div>
            </div>

            <section id="blogsSection" class="admin-section active">
                <div class="cms-layout">
                    <div class="panel">
                        <div class="panel-header">
                            <h2>文章列表</h2>
                            <button type="button" id="newBlog" class="btn primary">新建</button>
                        </div>
                        <div class="panel-body">
                            <div class="blog-toolbar">
                                <input type="search" id="blogSearch" placeholder="搜索标题、摘要、分类">
                                <select id="blogStatusFilter">
                                    <option value="all">全部</option>
                                    <option value="draft">草稿</option>
                                    <option value="published">已发布</option>
                                </select>
                            </div>
                            <div id="blogList" class="blog-list"></div>
                        </div>
                    </div>

                    <div class="panel">
                        <div class="editor-actions">
                            <button type="button" id="previewBlog" class="btn ghost">预览</button>
                            <button type="button" id="saveDraft" class="btn">保存草稿</button>
                            <button type="button" id="publishBlog" class="btn success">发布</button>
                            <button type="button" id="unpublishBlog" class="btn ghost">转为草稿</button>
                            <button type="button" id="deleteBlog" class="btn danger">删除</button>
                        </div>
                        <div class="panel-body">
                            <div id="editorNotice" class="notice"></div>
                            <form id="blogForm" class="form-grid">
                                <div class="form-group full">
                                    <label for="blogTitle">标题</label>
                                    <input id="blogTitle" type="text" required>
                                </div>
                                <div class="form-group full">
                                    <label for="blogSummary">摘要</label>
                                    <textarea id="blogSummary" rows="3"></textarea>
                                </div>
                                <div class="form-group">
                                    <label for="blogCoverImage">封面图片 URL</label>
                                    <div class="image-input-row">
                                        <input id="blogCoverImage" type="text" placeholder="https://example.com/image.webp">
                                        <button type="button" id="chooseCoverImage" class="btn ghost">本地图片</button>
                                    </div>
                                    <input id="coverImageFile" type="file" accept="image/png,image/jpeg,image/webp" hidden>
                                    <div id="coverImagePreview" class="cover-preview" aria-hidden="true"><img alt=""></div>
                                    <small id="coverImageHelp">本地图片会自动裁成 16:9 并压缩上传。</small>
                                </div>
                                <div class="form-group">
                                    <label for="blogCategory">分类</label>
                                    <input id="blogCategory" type="text" placeholder="ASRS / AGV / Smart Factory">
                                </div>
                                <div class="form-group">
                                    <label for="blogAuthor">作者</label>
                                    <input id="blogAuthor" type="text" value="13ASRS">
                                </div>
                                <div class="form-group">
                                    <label for="blogDate">日期</label>
                                    <input id="blogDate" type="date">
                                </div>
                                <div class="form-group">
                                    <label for="blogSeoTitle">SEO Title</label>
                                    <input id="blogSeoTitle" type="text">
                                </div>
                                <div class="form-group">
                                    <label for="blogSeoDescription">SEO Description</label>
                                    <input id="blogSeoDescription" type="text">
                                </div>
                                <div class="form-group full">
                                    <label>正文</label>
                                    <div class="rich-toolbar" aria-label="编辑器工具栏">
                                        <button type="button" data-command="bold" title="粗体">B</button>
                                        <button type="button" data-command="italic" title="斜体">I</button>
                                        <button type="button" data-command="underline" title="下划线">U</button>
                                        <button type="button" data-command="heading" title="标题">H</button>
                                        <button type="button" data-command="insertUnorderedList" title="无序列表">•</button>
                                        <button type="button" data-command="insertOrderedList" title="有序列表">1.</button>
                                        <button type="button" data-command="link" title="链接">Ln</button>
                                        <button type="button" data-command="image" title="图片 URL">Img</button>
                                    </div>
                                    <div id="blogContentEditor" class="rich-editor" contenteditable="true"></div>
                                    <small>图片请使用外链 URL，不保存 base64 图片。</small>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

            <section id="pagesSection" class="admin-section">
                <div class="panel">
                    <div class="panel-header">
                        <h2>页面内容</h2>
                        <button type="button" id="savePages" class="btn primary">保存页面内容</button>
                    </div>
                    <div class="panel-body page-grid">
                        <div class="form-group">
                            <label for="heroTitle">首页标题</label>
                            <input id="heroTitle" type="text">
                            <label for="heroDescription">首页描述</label>
                            <textarea id="heroDescription" rows="5"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="servicesTitle">Services 标题</label>
                            <input id="servicesTitle" type="text">
                            <label for="servicesDescription">Services 描述</label>
                            <textarea id="servicesDescription" rows="5"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="solutionsTitle">Solutions 标题</label>
                            <input id="solutionsTitle" type="text">
                            <label for="solutionsDescription">Solutions 描述</label>
                            <textarea id="solutionsDescription" rows="5"></textarea>
                            <label for="aboutTitle">About 标题</label>
                            <input id="aboutTitle" type="text">
                            <label for="aboutDescription">About 描述</label>
                            <textarea id="aboutDescription" rows="5"></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <section id="settingsSection" class="admin-section">
                <div class="panel">
                    <div class="panel-header">
                        <h2>设置</h2>
                    </div>
                    <div class="panel-body settings-list">
                        <div class="setting-row">
                            <strong>认证方式</strong>
                            <span>JWT 登录，会话存储在当前浏览器 Session。</span>
                        </div>
                        <div class="setting-row">
                            <strong>存储</strong>
                            <span>Cloudflare KV: BLOG_DATA / blog_v2</span>
                        </div>
                        <div>
                            <button type="button" class="btn danger" onclick="logout()">退出登录</button>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script src="api.js" defer></script>
    <script src="auth.js" defer></script>
    <script src="admin.js" defer></script>
</body>
</html>
